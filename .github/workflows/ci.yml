# ============================================================================
# Pipeline CI/CD - TaskBoard backend
# ----------------------------------------------------------------------------
# Déclenché à chaque push / pull request. Trois étapes obligatoires :
#   1) build : construit l'image Docker du backend
#   2) test  : lance les tests unitaires (npm test)
#   3) scan  : Trivy analyse l'image et ÉCHOUE sur toute CVE HIGH/CRITICAL
#
# Hypothèse : la racine du dépôt GitHub est le dossier "taskboard/".
# (le backend est donc dans ./backend)
# ============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Nom/tag de l'image, réutilisé par tous les jobs
env:
  IMAGE_NAME: taskboard-api
  IMAGE_TAG: "1.0.0"

jobs:
  # --------------------------------------------------------------------------
  # 1) TEST : tests unitaires Node (rapides, sans base de données)
  # --------------------------------------------------------------------------
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dépendances
        working-directory: backend
        run: npm install

      - name: Lancer les tests
        working-directory: backend
        run: npm test

  # --------------------------------------------------------------------------
  # 2) BUILD + 3) SCAN : on build l'image puis Trivy la scanne.
  #    Le job dépend de "test" : pas de scan si les tests échouent.
  # --------------------------------------------------------------------------
  build-and-scan:
    name: Build & Scan Trivy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image backend
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./backend

      # Trivy scanne l'image construite. --exit-code 1 fait ÉCHOUER le job
      # dès qu'une vulnérabilité HIGH ou CRITICAL est trouvée.
      - name: Scan de l'image avec Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true   # ignore les CVE sans correctif disponible

  # --------------------------------------------------------------------------
  # BONUS (CD) : push de l'image, derrière une approbation manuelle.
  # Ne s'exécute que sur la branche principale et si tout le reste est vert.
  # Configurez l'environment "production" dans GitHub (Settings > Environments)
  # avec "Required reviewers" pour activer l'approbation manuelle.
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy (bonus)
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    environment: production    # déclenche l'approbation manuelle si configurée
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Exemple de push vers le GitHub Container Registry (ghcr.io).
      # Décommentez et adaptez si vous voulez réellement publier l'image.
      # - name: Connexion à ghcr.io
      #   run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      # - name: Tag + push
      #   run: |
      #     docker build -t ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./backend
      #     docker push ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Étape de déploiement (placeholder)
        run: echo "Déploiement -> docker compose pull && docker compose up -d (à brancher sur votre cible)"
